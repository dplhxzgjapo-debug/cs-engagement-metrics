<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CS Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0b14;--surface:#14142a;--card:#1c1c3a;--card2:#222250;
  --hi:#ff4d6d;--hi2:#c9184a;--accent:#7b2ff7;--accent2:#4361ee;
  --txt:#f0f0f5;--sub:#8888aa;--muted:#555570;--bdr:#2a2a4a;
  --glass:rgba(255,255,255,.04);--glow:rgba(255,77,109,.15);
  --fire:#ff6b35;--water:#4facfe;--grass:#56ab2f;--electric:#f7d731;
  --ice:#74d0f1;--fighting:#d63031;--poison:#a55eea;--ground:#d4a762;
  --flying:#a29bfe;--psychic:#fd79a8;--bug:#a3cb38;--rock:#c4a35a;
  --ghost:#6c5ce7;--dragon:#5f27cd;--dark:#636e72;--steel:#a4b0bd;
  --fairy:#fd79a8;--normal:#a4a4b8;
  --radius:14px;--radius-sm:10px;
}
body{font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.6;padding-bottom:76px;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(123,47,247,.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(255,77,109,.04),transparent 50%);pointer-events:none;z-index:0}

/* Tabs */
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,42,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);z-index:100;padding:4px 0 env(safe-area-inset-bottom,0)}
.tab{flex:1;padding:8px 2px 6px;text-align:center;font-size:10px;color:var(--muted);cursor:pointer;transition:all .25s;position:relative}
.tab.active{color:var(--hi)}
.tab.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:linear-gradient(90deg,var(--hi),var(--accent));border-radius:2px}
.tab-i{font-size:20px;display:block;margin-bottom:2px}
.tab-label{font-weight:600;letter-spacing:.3px}

/* Pages */
.page{display:none;padding:16px 14px 24px;position:relative;z-index:1}
.page.active{display:block}
h1{font-size:18px;font-weight:700;text-align:center;padding:16px 0 8px;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
h2{font-size:13px;font-weight:700;color:var(--hi);margin:20px 0 8px;padding-left:10px;border-left:3px solid;border-image:linear-gradient(180deg,var(--hi),var(--accent)) 1;letter-spacing:.3px}

/* Cards */
.card{background:linear-gradient(135deg,var(--card),var(--surface));border-radius:var(--radius);padding:14px;margin:8px 0;border:1px solid rgba(255,255,255,.05);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.glass{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;color:#fff;margin-right:3px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.sm{font-size:11px;color:var(--sub)}

/* Pick Grid */
.pick-grid{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.pick-btn{padding:6px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;background:var(--card);color:var(--txt);border:1.5px solid var(--bdr);cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.pick-btn:active{transform:scale(.95)}
.pick-btn.on{border-color:var(--hi);background:linear-gradient(135deg,rgba(255,77,109,.15),rgba(123,47,247,.1));box-shadow:0 0 12px var(--glow)}
.pick-btn.ghost-type{border-left:3px solid var(--ghost)}
.picked-bar{display:flex;gap:5px;margin:10px 0;min-height:38px;flex-wrap:wrap;align-items:center}
.picked-tag{padding:5px 12px;background:linear-gradient(135deg,var(--hi),var(--hi2));color:#fff;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(255,77,109,.3)}
.picked-tag:active{transform:scale(.93)}
.reset-btn{padding:6px 16px;background:var(--card);color:var(--sub);border:1px solid var(--bdr);border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s;font-weight:600}

/* Recommendation */
.rec-card{background:linear-gradient(135deg,var(--card),rgba(123,47,247,.08));border:1.5px solid rgba(255,77,109,.2);border-radius:var(--radius);padding:16px;margin:12px 0;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.rec-title{font-size:16px;font-weight:800;background:linear-gradient(90deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.rec-trio{display:flex;gap:6px;margin:10px 0}
.rec-poke{flex:1;text-align:center;padding:10px 4px;background:var(--card);border-radius:var(--radius-sm);font-size:12px;font-weight:700;border:1px solid var(--bdr);transition:all .2s}
.rec-poke.lead{border-color:var(--hi);background:linear-gradient(135deg,var(--card),rgba(255,77,109,.1));box-shadow:0 0 12px var(--glow)}
.rec-poke.lead::before{content:"初手";display:block;font-size:9px;color:var(--hi);margin-bottom:3px;font-weight:800;letter-spacing:1px}
.rec-reason{font-size:12px;line-height:1.8;color:var(--sub);margin-top:8px}
.rec-warn{font-size:11px;color:#ff6b6b;margin-top:8px;padding:8px 10px;background:rgba(255,50,50,.06);border-radius:var(--radius-sm);border:1px solid rgba(255,50,50,.1);line-height:1.7}
.rec-alt{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05)}
.rec-answers{margin-top:10px}
.rec-ans-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.rec-ans-name{font-weight:700;color:var(--txt)}
.rec-ans-how{color:var(--sub);text-align:right;max-width:60%}

/* Fold/Accordion */
.fold{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin:8px 0;border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.fold:active{background:var(--card2)}
.fold-h{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700}
.fold-arrow{color:var(--muted);font-size:12px;transition:transform .3s}
.fold.open .fold-arrow{transform:rotate(180deg)}
.fold-sub{font-size:10px;color:var(--hi);margin-top:3px;font-weight:600;letter-spacing:.3px}
.fold-body{display:none;margin-top:10px;font-size:12px;line-height:1.8;color:var(--sub)}
.fold.open .fold-body{display:block}

/* Party Cards */
.p-card{background:linear-gradient(135deg,var(--card),var(--surface));border-radius:var(--radius);padding:14px;margin:8px 0;border:1px solid rgba(255,255,255,.05);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.p-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.p-name{font-size:15px;font-weight:800;letter-spacing:.3px}
.p-item{font-size:10px;color:var(--sub);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:20px;font-weight:600}
.p-moves{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.p-move{font-size:11px;padding:5px 6px;background:rgba(255,255,255,.04);border-radius:8px;text-align:center;font-weight:600;border:1px solid rgba(255,255,255,.04)}
.p-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:6px}
.p-role{font-size:10px;color:#fff;background:linear-gradient(90deg,var(--hi),var(--accent));padding:2px 10px;border-radius:20px;display:inline-block;margin-top:5px;font-weight:700;letter-spacing:.3px}

/* Speed */
.sp-row{margin:4px 0}
.sp-label{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--sub);margin-bottom:2px}
.sp-bar{height:20px;border-radius:6px;display:flex;align-items:center;padding-left:6px;font-size:9px;color:#fff;font-weight:700;position:relative;transition:width .5s}
.sp-v{position:absolute;right:5px;font-size:9px}
.mine-bar{box-shadow:0 0 10px var(--glow)}
.spd-tiers{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.spd-tier{flex:1;min-width:72px;text-align:center;padding:6px 4px;border-radius:var(--radius-sm);background:var(--card2);border:1px solid var(--bdr)}
.spd-tier-l{font-size:9px;color:var(--muted);font-weight:700}
.spd-tier-v{font-size:16px;font-weight:800;color:var(--hi)}
.spd-row{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:8px;margin:3px 0;font-size:12px;background:var(--card2)}
.spd-name{font-weight:700}
.spd-spe{font-size:11px;color:var(--sub);margin-left:auto;margin-right:8px}
.spd-win{color:#14b8a6;font-weight:800}
.spd-lose{color:#ef4444;font-weight:800}
.spd-tie{color:#fbbf24;font-weight:800}
.spd-sug{padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)}
.spd-sug:hover,.spd-sug.on{background:var(--card2)}
.spd-sug:last-child{border-bottom:none}
.spd-sug-meta{font-size:10px;color:var(--muted);margin-left:6px}

/* Type Table */
.tt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--bdr)}
table.tt{border-collapse:collapse;font-size:9px;min-width:600px;width:100%}
table.tt th,table.tt td{width:32px;height:26px;text-align:center;border:1px solid rgba(255,255,255,.04);padding:0}
table.tt th{background:var(--card);font-size:8px;font-weight:700;position:sticky;top:0;z-index:2}
.e2{background:rgba(34,139,34,.5);color:#fff;font-weight:bold}
.e5{background:rgba(180,50,50,.4);color:#ddd}
.e0{background:rgba(0,0,0,.4);color:#444}

/* Matchup */
.matchup-card{background:var(--card);border-radius:var(--radius);padding:10px 14px;margin:6px 0;border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.matchup-card:active{background:var(--card2)}
.matchup-card .fold-body{font-size:12px;line-height:1.8}
.mu-head{display:flex;align-items:center;gap:8px}
.mu-rank{font-size:10px;color:var(--muted);min-width:24px;font-weight:700}
.mu-name{font-weight:700;font-size:13px;flex:1}
.mu-answer{font-size:10px;color:var(--hi);font-weight:600;text-align:right;max-width:45%}

.updated{text-align:center;font-size:10px;color:var(--muted);padding:6px;font-weight:600;letter-spacing:.5px}
.mv-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.mv-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--sub);font-weight:600;border:1px solid rgba(255,255,255,.05)}
.rec-mv-row{margin-top:4px}
.rec-mv-row .mv-tag{font-size:9px;padding:1px 5px}

/* Battle Record */
.battle-btns{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
.battle-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:1px}
.battle-btn:active{transform:scale(.93)}
.btn-win{background:linear-gradient(135deg,#0d9488,#14b8a6);color:#fff;box-shadow:0 4px 16px rgba(20,184,166,.3)}
.btn-lose{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 16px rgba(239,68,68,.3)}
.stats-bar{display:flex;gap:6px;margin:10px 0;justify-content:center;flex-wrap:wrap}
.stat-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700}
.log-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;gap:8px}
.log-result{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;color:#fff;min-width:28px;text-align:center}
.log-w{background:#0d9488}.log-l{background:#dc2626}
.log-opp{color:var(--sub);flex:1;line-height:1.4}
.log-date{color:var(--muted);font-size:9px;white-space:nowrap}
.log-pat{font-size:9px;color:var(--accent);font-weight:600}
.weak-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03)}
.weak-name{font-weight:700;color:var(--txt)}.weak-stat{color:var(--sub)}
.weak-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#ef4444,#dc2626);margin-top:2px}
.team-sel{display:flex;gap:4px;margin:8px 0;justify-content:center;flex-wrap:wrap}
.team-btn{padding:7px 14px;border:1.5px solid var(--bdr);border-radius:20px;font-size:11px;font-weight:700;background:var(--card);color:var(--sub);cursor:pointer;transition:all .2s}
.team-btn:active{transform:scale(.95)}
.team-btn.active{border-color:var(--hi);color:var(--hi);background:linear-gradient(135deg,rgba(255,77,109,.12),rgba(123,47,247,.06));box-shadow:0 0 10px var(--glow)}
.team-label{text-align:center;font-size:10px;color:var(--muted);margin-bottom:2px;font-weight:600}
.reload-bar{display:flex;justify-content:flex-end;padding:8px 14px 0;position:relative;z-index:1}
.reload-btn{padding:5px 12px;border:1px solid var(--bdr);border-radius:20px;font-size:10px;font-weight:600;background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
.reload-btn:active{transform:scale(.93);color:var(--hi);border-color:var(--hi)}
</style>
</head>
<body>
<div class="reload-bar"><button class="reload-btn" onclick="location.href=location.pathname+'?v='+Date.now()">↻ 更新</button></div>

<!-- TAB 1: 選出 -->
<div class="page active" id="p-select">
<h1>SELECT ASSISTANT</h1>
<div class="team-sel" id="team-sel-select"></div>
<p class="sm" style="text-align:center;margin-bottom:4px">相手のポケモンをタップして選出提案を受ける</p>

<div class="picked-bar" id="picked-bar">
  <span class="sm" style="padding:8px">相手のポケモンを下から選択</span>
</div>
<div style="text-align:right;margin-bottom:4px"><button class="reset-btn" onclick="resetPicks()">リセット</button></div>
<div class="pick-grid" id="pick-grid"></div>
<div id="rec-result"></div>

<h2>選出パターン</h2>
<div id="patterns-container"></div>

<h2>戦績</h2>
<div id="battle-log"></div>
<div style="text-align:right;margin-top:4px"><button class="reset-btn" onclick="if(confirm('戦績を全てクリアしますか？')){localStorage.removeItem('poke_battles');renderBattleLog()}">戦績クリア</button></div>
</div>

<!-- TAB 2: パーティ -->
<div class="page" id="p-party">
<h1>MY TEAM</h1>
<div class="team-sel" id="team-sel-party"></div>
<div id="party-cards"></div>
</div>

<!-- TAB 3: 素早さ -->
<div class="page" id="p-speed">
<h1>SPEED CHECK</h1>
<h2>相手と素早さ比較 <span class="sm" style="font-weight:400">(選択中の構築と連動)</span></h2>
<div class="card">
  <div style="position:relative">
    <input type="text" id="spd-input" oninput="onSpdInput()" onfocus="onSpdInput()" onblur="setTimeout(()=>{document.getElementById('spd-suggest').style.display='none'},150)" placeholder="ポケモン名を入力 (例: メガゲ → メガゲンガー)" autocomplete="off" style="width:100%;padding:10px;border-radius:var(--radius-sm);background:var(--card2);color:var(--txt);border:1px solid var(--bdr);font-size:14px;font-weight:600">
    <div id="spd-suggest" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:240px;overflow-y:auto;background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius-sm);z-index:10;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,.5)"></div>
  </div>
  <label class="sm" style="display:flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer">
    <input type="checkbox" id="spd-scarf" onchange="renderSpdCompare()" style="width:16px;height:16px"> 相手スカーフ想定 (×1.5)
  </label>
  <div id="spd-compare"></div>
</div>
<h2>環境スピードティア</h2>
<div class="sm" style="margin-bottom:8px;text-align:center">
  <span style="color:var(--hi)">●</span> 自分　<span style="color:var(--muted)">●</span> 環境　(最速実数値)
</div>
<div id="speed-chart"></div>
</div>

<!-- TAB 4: 対策 -->
<div class="page" id="p-matchup">
<h1>MATCHUP GUIDE</h1>
<div class="updated" id="meta-updated"></div>
<div id="matchup-list"></div>
</div>

<!-- TAB 5: タイプ -->
<div class="page" id="p-type">
<h1>TYPE CHART</h1>
<p class="sm" style="text-align:center;margin-bottom:6px">横スクロール / 攻撃→防御</p>
<div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px">
  <span class="e2" style="padding:2px 8px;border-radius:6px;font-size:10px">◎抜群</span>
  <span class="e5" style="padding:2px 8px;border-radius:6px;font-size:10px">△半減</span>
  <span class="e0" style="padding:2px 8px;border-radius:6px;font-size:10px">✕無効</span>
</div>
<div class="tt-wrap" id="type-table"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="sw('select')"><span class="tab-i">🎯</span><span class="tab-label">選出</span></div>
  <div class="tab" onclick="sw('party')"><span class="tab-i">⚔️</span><span class="tab-label">パーティ</span></div>
  <div class="tab" onclick="sw('speed')"><span class="tab-i">⚡</span><span class="tab-label">素早さ</span></div>
  <div class="tab" onclick="sw('matchup')"><span class="tab-i">🛡️</span><span class="tab-label">対策</span></div>
  <div class="tab" onclick="sw('type')"><span class="tab-i">📊</span><span class="tab-label">タイプ</span></div>
</div>

<script>
const DATA_VERSION="2026-04-30";

const TEAMS={
tenkai:{name:"展開構築",sub:"メガリザードンX軸",
members:[
  {name:"リザードン",types:["fire","dragon"],item:"リザードナイトX",moves:["フレアドライブ","ドラゴンクロー","りゅうのまい","ニトロチャージ"],nature:"ようき",ev:"A252 S252 H4",speed:167,role:"メガX 竜舞エース"},
  {name:"カバルドン",types:["ground"],item:"オボンのみ",moves:["じしん","ステルスロック","あくび","ふきとばし"],nature:"わんぱく",ev:"H252 B160 D96",speed:47,role:"ステロ+あくび起点"},
  {name:"ウルガモス",types:["bug","fire"],item:"ラムのみ",moves:["ちょうのまい","ほのおのまい","むしのさざめき","ギガドレイン"],nature:"ひかえめ",ev:"C252 S252 H4",speed:167,role:"蝶舞 特殊エース"},
  {name:"ミミッキュ",types:["ghost","fairy"],item:"きあいのタスキ",moves:["つるぎのまい","じゃれつく","かげうち","シャドークロー"],nature:"ようき",ev:"A252 S252 H4",speed:162,role:"ストッパー / 第3エース"},
  {name:"ガブリアス",types:["dragon","ground"],item:"こだわりスカーフ",moves:["じしん","げきりん","がんせきふうじ","どくづき"],nature:"ようき",ev:"A252 S252 H4",speed:169,role:"スカーフストッパー"},
  {name:"ドドゲザン",types:["dark","steel"],item:"たべのこし",moves:["つるぎのまい","アイアンヘッド","ふいうち","はたきおとす"],nature:"いじっぱり",ev:"H252 A252 D4",speed:112,role:"積み+先制エース"}
],patterns:[
  {id:1,name:"① 基本展開",lead:"カバルドン",members:["カバルドン","リザードン","ウルガモス"],desc:"カバステロ+あくび→催眠中にリザX竜舞→全抜き",shortWhen:"バランス型/受けがいる"},

// ===== RECOMMENDER =====
let picked=[];
function scorePick(ids){
  const opp=ids.map(id=>POKEDB.find(p=>p.id===id)).filter(Boolean);
  if(!opp.length)return null;
  const walls=opp.filter(p=>p.cat==="wall"||p.cat==="support");
  const phyAtk=opp.filter(p=>p.cat==="phy_atk");
  const speAtk=opp.filter(p=>p.cat==="spe_atk");
  const setup=opp.filter(p=>p.cat==="setup");
  const ghosts=opp.filter(p=>p.ghost);
  const traps=opp.filter(p=>!p.ghost&&(p.cat==="wall"||p.cat==="support"));
  const fires=opp.filter(p=>p.types.includes("fire"));
  const elecs=opp.filter(p=>p.types.includes("electric"));
  const hasRiza=opp.some(p=>p.name==="リザードン");
  const hasUlga=opp.some(p=>p.name==="ウルガモス");
  let sc=[{pat:PATTERNS[0],score:45},{pat:PATTERNS[1],score:25},{pat:PATTERNS[2],score:15},{pat:PATTERNS[3],score:15}];
  sc[0].score+=traps.length*18+(opp.length>=3?10:0)-ghosts.length*8;
  sc[1].score+=setup.length*20+phyAtk.length*5+(hasRiza?20:0)+(hasUlga?20:0);
  sc[2].score+=phyAtk.length*15-speAtk.length*20-fires.length*15+(speAtk.length===0&&opp.length>=3?25:0);
  sc[3].score+=walls.length*25+(walls.length>=2?20:0)-(opp.length-walls.length)*3;
  sc.sort((a,b)=>b.score-a.score);
  let flex2="アーマーガア";
  if(speAtk.length>phyAtk.length||opp.some(p=>p.types.includes("dragon")))flex2="アシレーヌ";
  let warns=[];
  if(opp.find(p=>p.name==="ミミロップ"))warns.push("メガミミロップ(S205)→メガゲンガー(S200)抜かれる！ガアで受ける");
  if(opp.find(p=>p.name==="ドラパルト"))warns.push("ドラパルト(S213)→全員抜かれる。スカーフサザン(247)で抜ける");
  if(ghosts.length>=2)warns.push("ゴースト"+ghosts.length+"体→かげふみが効かない相手が多い");
  if(opp.find(p=>p.name==="ガブリアス"))warns.push("ガブがスカーフ(S253)なら全員抜かれる→ガアで受ける");
  if(hasRiza)warns.push("リザードンY型→炎でガアが焼かれる。ガアを炎技に投げない");
  if(elecs.length)warns.push("電気タイプ→ガアとアシレが弱点。ガブかカバで受ける");
  if(opp.find(p=>p.name==="エーフィ"))warns.push("マジックミラー→ステロ・あくびが跳ね返される。カバ選出注意");
  if(opp.find(p=>p.name==="ドリュウズ")&&opp.find(p=>p.name==="カバルドン"))warns.push("砂パ警戒→ドリュウズがすなかきで最速S224");
  let answers=opp.map(p=>({name:p.name,answer:p.answer,warn:p.warn,moves:p.liveMoves||p.moves||[]}));
  return{best:sc[0],second:sc[1],flex2,warnings:warns,answers,allScores:sc};
}
function renderRec(){
  const el=document.getElementById('rec-result');
  if(!picked.length){el.innerHTML='';return}
  const r=scorePick(picked);if(!r){el.innerHTML='';return}
  let m=[...r.best.pat.members].map(x=>x==="flex"?r.flex2:x);
  let h=`<div class="rec-card"><div class="rec-title">▸ ${r.best.pat.name}</div><div class="sm">${r.best.pat.shortWhen}</div><div class="rec-trio">${m.map((x,i)=>`<div class="rec-poke${i===0?' lead':''}">${x}</div>`).join('')}</div><div class="rec-reason">${r.best.pat.desc}</div>`;
  if(r.warnings.length)h+=`<div class="rec-warn">⚠ ${r.warnings.join('<br>⚠ ')}</div>`;
  h+=`<div class="rec-answers">${r.answers.map(a=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div class="rec-ans-row"><span class="rec-ans-name">${a.name}</span><span class="rec-ans-how">${a.answer}</span></div><div class="rec-mv-row mv-list">${a.moves.map(m=>`<span class="mv-tag">${m}</span>`).join('')}</div></div>`).join('')}</div>`;
  let sm=[...r.second.pat.members].map(x=>x==="flex"?r.flex2:x);
  h+=`<div class="rec-alt">次点: <b>${r.second.pat.name}</b> → ${sm.join(' / ')}</div>`;
  h+=`<div class="battle-btns"><button class="battle-btn btn-win" onclick="saveBattle('win')">⭕ WIN</button><button class="battle-btn btn-lose" onclick="saveBattle('lose')">✕ LOSE</button></div></div>`;
  el.innerHTML=h;
}

let liveData = null;
async function fetchLiveData(){
  try {
    const res = await fetch('data.json?t='+Date.now());
    if(!res.ok) return;
    liveData = await res.json();
    // Update POKEDB moves from ranking data
    if(liveData && liveData.pokemon){
      liveData.pokemon.forEach(lp => {
        const baseName = lp.name.replace(/^メガ/,'');
        const match = POKEDB.find(p => p.name === lp.name || p.name === baseName || lp.name.includes(p.name));
        if(match && lp.moves_mentioned && lp.moves_mentioned.length > 0){
          match.liveMoves = lp.moves_mentioned;
          match.liveRank = lp.rank;
        }
      });
    }
    // Add ALL pokemon from pokedex (ones not already in POKEDB)
    if(liveData && liveData.all_pokemon){
      let nextId = 1000;
      const existingNames = new Set(POKEDB.map(p=>p.name));
      liveData.all_pokemon.forEach(ap => {
        if(existingNames.has(ap.name)) return;
        POKEDB.push({
          id: nextId++,
          name: ap.name,
          types: ap.types,
          spd: ap.spe_max,
          cat: ap.cat,
          ghost: ap.ghost,
          sets:'', moves:[], answer:'', warn:''
        });
      });
    }
    // Speed DB (全187体・素早さ種族値)
    if(liveData && liveData.all_pokemon){
      SPEED_DB = liveData.all_pokemon.map(ap=>({name:ap.name,base:ap.spe_base,types:ap.types})).sort((a,b)=>a.name.localeCompare(b.name,'ja'));
      populateSpdSelect();
    }
    // Re-render with full data
    renderGrid(); renderMatchups();
    document.getElementById('meta-updated').textContent =
      'LIVE DATA: ' + (liveData.updated_at||'').slice(0,10) + ' (' + POKEDB.length + '体)';
  } catch(e){ console.log('Live data not available, using static'); }
}

// ===== BATTLE RECORD =====
const STORAGE_KEY='poke_battles';
function loadBattles(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
function saveBattle(result){
  if(!picked.length)return;
  const r=scorePick(picked);
  const battles=loadBattles();
  battles.unshift({
    date:new Date().toISOString().slice(0,10),
    time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),
    opp:picked.map(id=>{const p=POKEDB.find(x=>x.id===id);return p?p.name:null}).filter(Boolean),
    pattern:r?.best?.pat?.name||'?',
    result
  });
  if(battles.length>200)battles.length=200;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(battles));
  renderBattleLog();
  resetPicks();
}
function renderBattleLog(){
  const el=document.getElementById('battle-log');
  if(!el)return;
  const battles=loadBattles();
  if(!battles.length){el.innerHTML='<p class="sm" style="padding:12px;text-align:center">まだ記録なし</p>';return}
  const wins=battles.filter(b=>b.result==='win').length;
  const total=battles.length;
  const rate=Math.round(wins/total*100);
  let h='<div class="stats-bar">';
  h+=`<span class="stat-chip" style="background:rgba(20,184,166,.15);color:#14b8a6">${wins}W</span>`;
  h+=`<span class="stat-chip" style="background:rgba(239,68,68,.15);color:#ef4444">${total-wins}L</span>`;
  h+=`<span class="stat-chip" style="background:rgba(255,255,255,.08);color:var(--txt)">勝率 ${rate}%</span>`;
  h+='</div>';
  // 苦手ポケモン分析
  const oppStats={};
  battles.forEach(b=>{b.opp.forEach(name=>{
    if(!oppStats[name])oppStats[name]={w:0,l:0};
    b.result==='win'?oppStats[name].w++:oppStats[name].l++;
  })});
  const weak=Object.entries(oppStats).map(([name,s])=>({name,w:s.w,l:s.l,total:s.w+s.l,lrate:Math.round(s.l/(s.w+s.l)*100)})).filter(x=>x.total>=2&&x.lrate>=50).sort((a,b)=>b.l-a.l).slice(0,5);
  if(weak.length){
    h+='<div class="card" style="margin:8px 0"><div style="font-size:11px;font-weight:700;color:var(--hi);margin-bottom:6px">苦手ポケモン (2戦以上・負け率50%↑)</div>';
    weak.forEach(w=>{
      h+=`<div class="weak-row"><span class="weak-name">${w.name}</span><span class="weak-stat">${w.w}W ${w.l}L (負率${w.lrate}%)</span></div>`;
    });
    h+='</div>';
  }
  // 直近10戦
  const recent=battles.slice(0,10);
  h+='<div class="card" style="margin:8px 0">';
  h+=recent.map(b=>`<div class="log-row"><span class="log-result ${b.result==='win'?'log-w':'log-l'}">${b.result==='win'?'W':'L'}</span><span class="log-opp">${b.opp.join(' ')}<br><span class="log-pat">${b.pattern}</span></span><span class="log-date">${b.date}<br>${b.time||''}</span></div>`).join('');
  if(battles.length>10)h+=`<div class="sm" style="text-align:center;padding:6px">他${battles.length-10}件</div>`;
  h+='</div>';
  el.innerHTML=h;
}

// ===== SPEED CHECK =====
let SPEED_DB=[];
// メガ進化形の素早さ種族値 (all_pokemonに含まれないので別途定義)
const MEGA_SPEED={
  "メガゲンガー":130,"メガリザードンX":100,"メガリザードンY":100,"メガサーナイト":100,
  "メガガブリアス":92,"メガバンギラス":71,"メガルカリオ":112,"メガガルーラ":100,
  "メガミミロップ":135,"メガフシギバナ":80,"メガヘラクロス":75,"メガエルレイド":110,
  "メガオーダイル":78,"メガメガニウム":60,"メガエンブオー":55,"メガギャラドス":81,
  "メガハッサム":75,"メガクチート":50,"メガアブソル":115,"メガスピアー":145,
  "メガフーディン":150,"メガラティアス":110,"メガラティオス":110,"メガゲッコウガ":132,
  "メガデンリュウ":75,"メガヘルガー":115,"メガジュペッタ":80,"メガピクシー":60,
  "メガプテラ":150,"メガタブンネ":40,"メガユキノオー":30,
  "メガフーパ":70,"メガサメハダー":105,"メガラグラージ":70,"メガジュカイン":120,
  "メガバシャーモ":100,"メガレックウザ":115,"メガジガルデ":95
};
// メガ用タイプ変化 (メガで複合タイプが変わるケース)
const MEGA_TYPES={
  "メガリザードンX":["fire","dragon"],"メガサーナイト":["psychic","fairy"],
  "メガメガニウム":["grass","fairy"],"メガオーダイル":["water","dragon"],
  "メガエンブオー":["fire","fighting"],"メガミミロップ":["normal","fighting"],
  "メガフーディン":["psychic"],"メガピクシー":["fairy"]
};
function spdStat(base,ev,nat){return Math.floor((Math.floor((2*base+31+Math.floor(ev/4))*50/100)+5)*nat);}
function buildSpeedDB(){
  const arr=SPEED_DB.slice();
  Object.entries(MEGA_SPEED).forEach(([name,base])=>{
    if(arr.some(x=>x.name===name))return;
    // 元ポケのタイプを継承 (メガXXX → XXX)
    const baseName=name.replace(/^メガ/,'').replace(/X$|Y$/,'');
    const orig=SPEED_DB.find(x=>x.name===baseName);
    const types=MEGA_TYPES[name]||(orig?orig.types:[]);
    arr.push({name,base,types,isMega:true});
  });
  return arr.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
}
function onSpdInput(){
  const inp=document.getElementById('spd-input');
  const sug=document.getElementById('spd-suggest');
  if(!inp||!sug)return;
  const q=(inp.value||'').trim();
  const all=buildSpeedDB();
  const list=q?all.filter(p=>p.name.includes(q)).slice(0,30):all.slice(0,30);
  if(!list.length){sug.style.display='none';return}
  sug.innerHTML=list.map(p=>`<div class="spd-sug" onmousedown="pickSpd('${p.name.replace(/'/g,"\\'")}')">${p.name}<span class="spd-sug-meta">S種${p.base}${p.isMega?' / メガ':''}</span></div>`).join('');
  sug.style.display='block';
}
function pickSpd(name){
  document.getElementById('spd-input').value=name;
  document.getElementById('spd-suggest').style.display='none';
  renderSpdCompare();
}
function populateSpdSelect(){
  // 入力UI移行に伴いプルダウン廃止。初回のサジェスト準備のみ。
  onSpdInput();
}
function renderSpdCompare(){
  const el=document.getElementById('spd-compare');if(!el)return;
  const inp=document.getElementById('spd-input');
  const name=inp?inp.value.trim():'';
  if(!name){el.innerHTML='';return}
  const p=buildSpeedDB().find(x=>x.name===name);
  if(!p){el.innerHTML='<div class="sm" style="padding:8px;color:var(--muted)">候補から選択してください</div>';return}
  const scarf=document.getElementById('spd-scarf').checked;
  const mul=scarf?1.5:1;
  const tMax=Math.floor(spdStat(p.base,252,1.1)*mul);
  const tNeu=Math.floor(spdStat(p.base,252,1.0)*mul);
  const tMin=Math.floor(spdStat(p.base,0,1.0)*mul);
  let h=`<div class="spd-tiers">
    <div class="spd-tier"><div class="spd-tier-l">最速${scarf?'+スカ':''}</div><div class="spd-tier-v">${tMax}</div></div>
    <div class="spd-tier"><div class="spd-tier-l">準速${scarf?'+スカ':''}</div><div class="spd-tier-v">${tNeu}</div></div>
    <div class="spd-tier"><div class="spd-tier-l">無振り${scarf?'+スカ':''}</div><div class="spd-tier-v">${tMin}</div></div>
  </div>`;
  const mine=MY_TEAM.map(m=>{
    const eff=m.item==='こだわりスカーフ'?Math.floor(m.speed*1.5):m.speed;
    return{name:m.name,eff,scarf:m.item==='こだわりスカーフ'};
  }).sort((a,b)=>b.eff-a.eff);
  h+=mine.map(m=>{
    let verdict,cls;
    if(m.eff>tMax){verdict='最速も抜く';cls='spd-win';}
    else if(m.eff===tMax){verdict='最速と同速';cls='spd-tie';}
    else if(m.eff>tNeu){verdict='準速まで抜く';cls='spd-win';}
    else if(m.eff===tNeu){verdict='準速と同速';cls='spd-tie';}
    else if(m.eff>tMin){verdict='無振りのみ抜く';cls='spd-tie';}
    else if(m.eff===tMin){verdict='無振りと同速';cls='spd-tie';}
    else{verdict='抜けない';cls='spd-lose';}
    return `<div class="spd-row"><span class="spd-name">${m.name}${m.scarf?'<span class="sm">@スカーフ</span>':''}</span><span class="spd-spe">S${m.eff}</span><span class="${cls}">${verdict}</span></div>`;
  }).join('');
  el.innerHTML=h;
}

// ===== TEAM SWITCH =====
function switchTeam(key){
  currentTeamKey=key;
  MY_TEAM=TEAMS[key].members;
  PATTERNS=TEAMS[key].patterns;
  renderTeamSel();renderParty();renderSpeed();renderPatterns();resetPicks();renderSpdCompare();
}
function renderTeamSel(){
  const html=Object.entries(TEAMS).map(([k,t])=>`<button class="team-btn${k===currentTeamKey?' active':''}" onclick="switchTeam('${k}')">${t.name}</button>`).join('');
  document.querySelectorAll('[id^=team-sel]').forEach(el=>{el.innerHTML=html});
}
function renderPatterns(){
  const t=getTeam();
  document.getElementById('patterns-container').innerHTML=t.patterns.map(p=>
    `<div class="fold" onclick="this.classList.toggle('open')"><div class="fold-h"><span>${p.name}</span><span class="fold-arrow">▾</span></div><div class="fold-sub">${p.shortWhen}</div><div class="fold-body"><b>初手${p.lead}</b> → ${p.members.join(' / ')}<br>${p.desc}</div></div>`
  ).join('');
}

renderTeamSel();renderGrid();renderParty();renderSpeed();renderMatchups();renderType();renderPatterns();renderBattleLog();
fetchLiveData();
